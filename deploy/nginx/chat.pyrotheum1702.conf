# PyroBot vhost for a host-level nginx that already owns :80/:443 (shared box).
# Use this INSTEAD of the bundled Caddy service. Pair it with the loopback port
# publish in deploy/docker-compose.yml (ports: "127.0.0.1:8017:8017").
#
# Install:
#   sudo cp deploy/nginx/chat.pyrotheum1702.conf /etc/nginx/conf.d/
#   # edit server_name below to your subdomain, then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d chat.pyrotheum1702.com   # adds the 443 block + cert
#
# certbot rewrites this file to add the `listen 443 ssl` lines and cert paths.

server {
    listen 80;
    listen [::]:80;
    server_name chat.pyrotheum1702.com;

    # Match the app's MAX_UPLOAD_MB (20) so uploads aren't cut off by nginx first.
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8017;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /api/chat streams via SSE token-by-token. Without these nginx buffers
        # the whole response and the chat appears to hang, then dumps at once.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
