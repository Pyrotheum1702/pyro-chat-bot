# Production stack: PyroBot behind Caddy (auto-HTTPS) on a VPS.
#   cd deploy && docker compose up -d --build
# The app is NOT published to the host — only Caddy is. Caddy terminates TLS and
# reverse-proxies to the app over the internal Docker network.
services:
  app:
    build: ..                      # build context = project root (Dockerfile there)
    env_file:
      - ../.env                    # FIREWORKS_API_KEY, EMBED_ORIGINS, etc.
    environment:
      - DATA_DIR=/data             # Chroma + SQLite persist in the volume below
      - PORT=8017
      - TRUST_PROXY_HEADERS=true   # behind Caddy → use X-Forwarded-For for per-IP limits
    volumes:
      - ragdata:/data
    expose:
      - "8017"                     # internal Docker network (used by the Caddy service below)
    # Publish to loopback ONLY so an existing host reverse proxy (e.g. system nginx
    # that already owns 80/443 on a shared box) can reach the app at 127.0.0.1:8017.
    # Harmless for the Caddy path (Caddy reaches the app over the Docker network).
    # NOT 0.0.0.0 — we don't want the app exposed directly to the public internet.
    ports:
      - "127.0.0.1:8017:8017"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data           # persists issued certificates
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  ragdata:
  caddy_data:
  caddy_config:
